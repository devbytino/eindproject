<body>

<div id="map"></div>
<header>
  <h1 class="heading">SEISMIC_ CORE</h1>
  <button id="darkBtn">Dark/Light</button>
</header>
<section>
  <div class="content container">
    <h2>Earthquakes in the last 24hrs</h2>
    <label for="filterByMag">Filter by magnitude:</label>
    <select id="filterByMag" name="magnitude-filter">
      <option value="all">All</option>
      <option value="5+">5+ mag</option>
      <option value="4+">4+ mag</option>
      <option value="3+">3+ mag</option>
      <option value="2+">2+ mag</option>
      <option value="1+">1+ mag</option>
    </select>
    <ul id="earthquake-list">
    </ul>
    <button id="show-more-btn" style="display: none;">Show More</button>
  </div>
  <div class="earthquake-details hidden" id="details-panel">
    <p>Panel goes here</p>
  </div>
</section>
</body>
